<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella | Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #060814;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        }

        .btn-space {
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-space:hover {
            background: #ffc107;
            transform: translateY(-2px);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00d4ff;
            color: #fff;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="signup-card text-center">
        <img src="images/logo-yellow.png" alt="Stella Logo" style="height: 60px;" class="mb-3">
        <h3 class="fw-bold text-white mb-1">JOIN STELLA</h3>
        <p class="text-white-50 small mb-4">Create an account to start tracking</p>

        <form id="signupForm">
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Username</label>
                <input type="text" id="username" class="form-control" placeholder="e.g. explorer" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div id="alertMsg" class="small text-danger mb-3"></div>

            <button type="submit" class="btn btn-space w-100 py-2 mb-3">Register Account</button>
            <a href="login.html" class="text-white-50 small text-decoration-none">Already have an account? Log In</a>
        </form>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');

            // Check if username already exists
            if (localStorage.getItem('user_' + username)) {
                alertMsg.innerText = "An account with this username already exists!";
                return;
            }

            // Save user details as a JSON object
            const userData = {
                name: fullName,
                username: username,
                email: email,
                password: password
            };

            // Stored under 'user_username' so login.html can find it
            localStorage.setItem('user_' + username, JSON.stringify(userData));

            // Success feedback and redirect
            alertMsg.className = "small text-success mb-3";
            alertMsg.innerText = "Registration successful! Redirecting to login...";

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>

</body>
</html>
