<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella | Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #060814;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        }

        .btn-space {
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-space:hover {
            background: #ffc107;
            transform: translateY(-2px);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00d4ff;
            color: #fff;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="images/logo-yellow.png" alt="Stella Logo" style="height: 70px;" class="mb-3">
        <h3 class="fw-bold text-white mb-1">STELLA ACCESS</h3>
        <p class="text-white-50 small mb-4">Enter credentials to initialize universe tracker</p>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Username</label>
                <input type="text" id="username" class="form-control" placeholder="e.g. explorer" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div id="alertMsg" class="small text-danger mb-3"></div>

            <button type="submit" class="btn btn-space w-100 py-2 mb-3">Launch Space Deck</button>
            <a href="signup.html" class="btn btn-outline-light btn-sm w-100">Sign Up / Register</a>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('stella_logged_in') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');

            // Find stored account details by username key
            const storedData = localStorage.getItem('user_' + username);

            if (storedData) {
                const user = JSON.parse(storedData);
                if (user.password === pass) {
                    localStorage.setItem('stella_logged_in', 'true');
                    localStorage.setItem('stella_user', JSON.stringify(user));
                    window.location.href = 'index.html';
                } else {
                    alertMsg.innerText = "Incorrect password.";
                }
            } else {
                alertMsg.innerText = "No account found with this username. Click Sign Up below.";
            }
        });
    </script>

</body>
</html>
